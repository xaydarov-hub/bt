cat > render.yaml << 'EOF'
services:
  - type: web
    name: efootball-bot
    env: python
    plan: free
    buildCommand: cd bot && pip install -r requirements.txt
    startCommand: cd bot && python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: CHANNEL_ID
        sync: false
EOF

git add render.yaml
git commit -m "Fix path in render.yaml"
git push origin main